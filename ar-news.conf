# ar-news.conf - User configuration for allstar-ar-news
# https://github.com/N6LKA/allstar-ar-news
#
# This file is shared by play_news.sh and cancel_news.sh.
# Edit the values below to match your installation.
# This file will NOT be overwritten by updates.

# VOICEDIR - Directory where ar-news audio files are installed.
VOICEDIR="/etc/asterisk/scripts/ar-news/audio_files"

# TMPDIR - Directory for temporary files during playback.
TMPDIR="/tmp"

# LNKACTTIMER - Manage the link activity timer during news playback.
#   "1" - Enable: the timer will be disabled while news plays, then re-enabled.
#   "0" - Disable: leave the link activity timer alone.
LNKACTTIMER="1"

# LNKACTTYPE - Which link activity timer implementation to use (when LNKACTTIMER=1).
#   "monitor" - asl3-link-activity-monitor by N6LKA (/usr/local/bin/lnkact)
#              See: https://github.com/N6LKA/asl3-link-activity-monitor
#   "native"  - ASL3 native link activity timer (cop 46/45)
LNKACTTYPE="monitor"

# ARRLNEWSNODE - AllStar node number for ARRL Audio News.
ARRLNEWSNODE="516229"

# ARNNEWSNODE - AllStar node number for Amateur Radio Newsline (ARN).
#               Echolink node 6397 mapped as AllStar node 3006397.
ARNNEWSNODE="3006397"

# logfile - Path to the Asterisk connection log.
#           Used by play_news.sh to detect when the news node disconnects.
logfile="/var/log/asterisk/connectlog"

# LOCALNODE - Your ASL3 node number.
#             Used by generate_audio.sh and test_audio.sh for asl-tts playback.
LOCALNODE=""

# CALLSIGN - Your station callsign. Used in QST announcement text.
CALLSIGN="W1ABC"

# STATIONTYPE - Your station type for QST announcements.
#   "Repeater" or "Node"
STATIONTYPE="Repeater"

# AUDIOMODE - Which set of audio files to use for announcements.
#   "files" - Use the pre-recorded .ul audio files in VOICEDIR (default)
#   "tts"   - Use TTS-generated audio files in VOICEDIR/tts/
#             Run generate_audio.sh first to create the TTS files.
#             play_news.sh will run generate_audio.sh automatically if
#             TTS files are missing.
AUDIOMODE="tts"
